grid_search:
  class: GridSearchCV
  module: sklearn.model_selection
  params:
    cv: 3
    verbose: 2


model_selection:

  module_0:
    class: KNeighborsClassifier
    module: sklearn.neighbors
    params:
      n_neighbors: 5
      weights: uniform
    search_param_grid:
      n_neighbors:
        - 3
        - 5
        - 7
        - 9
      weights:
        - uniform
        - distance


  module_1:
    class: RandomForestClassifier
    module: sklearn.ensemble
    params:
      n_estimators: 100
      max_depth: 10
    search_param_grid:
      n_estimators:
        - 50
        - 100
        - 150
      max_depth:
        - 10
        - 20   # ❌ None removed


  module_2:
    class: XGBClassifier
    module: xgboost
    params:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 5
      eval_metric: mlogloss
    search_param_grid:
      n_estimators:
        - 50
        - 100
      max_depth:
        - 3
        - 5
        - 7
      learning_rate:
        - 0.01
        - 0.1